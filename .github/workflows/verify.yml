name: Verify

# Source-of-truth = spec/*.py.  dist/ is not committed -- consumers
# generate at build time. CI's job is: confirm the spec compiles to
# valid DBCs and a parseable C header, and that no cross-ECU
# collisions slipped in.

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install cantools
        run: pip install cantools

      - name: Cross-ECU collision audit
        run: python3 -m tools.check_ids

      - name: Generate artifacts into a scratch dir
        run: |
          python3 -m tools.gen_dbc      --out /tmp/dist
          python3 -m tools.gen_c_header --out /tmp/dist
          ls -la /tmp/dist

      - name: Parse each DBC with cantools
        run: |
          for f in /tmp/dist/*.dbc; do
            python3 -c "import sys, cantools; db = cantools.database.load_file(sys.argv[1]); print(f'{sys.argv[1]}: {len(db.messages)} messages, {sum(len(m.signals) for m in db.messages)} signals')" "$f"
          done

      - name: C header smoke-compile (gcc -fsyntax-only)
        run: |
          cat > /tmp/header_smoke.c <<'EOF'
          #include "ifs08_can_ids.h"
          int main(void) { return 0; }
          EOF
          gcc -I/tmp/dist -fsyntax-only /tmp/header_smoke.c
