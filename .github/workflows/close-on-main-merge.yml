name: Close linked issues on merge to main

# This repo's default branch is `main` (no separate `dev`), so the
# stock GitHub auto-close on `Closes #N` already fires. Workflow kept
# here for parity with the AMS-side automation (which targets `dev`)
# and to handle the multi-issue case GitHub's native parser misses --
# `Closes #75, #76, #77` only auto-closes #75 with the native logic;
# this workflow consumes comma- and "and"-separated continuation
# lists too.

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  close-linked:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read

    steps:
      - name: Close issues referenced by the PR body
        uses: actions/github-script@v7
        env:
          PR_BODY:   ${{ github.event.pull_request.body }}
          PR_TITLE:  ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BASE:   ${{ github.event.pull_request.base.ref }}
        with:
          script: |
            const body    = process.env.PR_BODY  || '';
            const title   = process.env.PR_TITLE || '';
            const prNum   = parseInt(process.env.PR_NUMBER, 10);
            const baseRef = process.env.PR_BASE;

            /* GitHub's own closing keywords:
                 close, closes, closed, fix, fixes, fixed,
                 resolve, resolves, resolved
               Followed by an optional colon and `#N`.

               GitHub's native parser only matches one issue per
               keyword, so "Closes #75, #76, #77" auto-closes #75
               only. This workflow used to inherit that limitation;
               we now also consume comma- and "and"-separated lists
               that immediately follow the anchor match ("Closes #1,
               #2 and #3", "Fixes #4, and #5", etc.). The sticky-y
               flag on the continuation regex forces it to match at
               the exact position the previous match ended -- a
               stray "#99" later in the text doesn't get pulled in. */
            const anchor       = /\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s*:?\s*#(\d+)/gi;
            const continuation = /\s*(?:,\s*and|,|and)\s*#(\d+)/giy;

            const text = `${title}\n${body}`;
            const numbers = new Set();
            let m;
            while ((m = anchor.exec(text)) !== null) {
              numbers.add(parseInt(m[1], 10));
              continuation.lastIndex = anchor.lastIndex;
              let cm;
              while ((cm = continuation.exec(text)) !== null) {
                numbers.add(parseInt(cm[1], 10));
                anchor.lastIndex = continuation.lastIndex;
              }
            }

            if (numbers.size === 0) {
              console.log('No closing-keyword references found in PR body or title.');
              return;
            }

            for (const n of numbers) {
              try {
                const { data: issue } = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  issue_number: n,
                });
                if (issue.pull_request) {
                  console.log(`#${n} is a PR, skipping.`);
                  continue;
                }
                if (issue.state === 'closed') {
                  console.log(`#${n} already closed, skipping.`);
                  continue;
                }
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  issue_number: n,
                  state: 'closed',
                  state_reason: 'completed',
                });
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  issue_number: n,
                  body:  `Closed by #${prNum} (merged into \`${baseRef}\`).`,
                });
                console.log(`Closed #${n}.`);
              } catch (err) {
                console.log(`Could not close #${n}: ${err.message}`);
              }
            }
